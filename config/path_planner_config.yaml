# ===========================
# 路径规划配置
# ===========================

# ---------- 红/蓝 高度地图 ----------
height_maps:
  blue:
    rows: 6
    cols: 3
    target_point_coord: [0, 0]   # 蓝方目标点
    data:
      - [0, 0, 0]   # y=0 (底行)
      - [1, 2, 1]   # y=1
      - [2, 3, 2]   # y=2
      - [1, 2, 3]   # y=3
      - [2, 1, 2]   # y=4
      - [0, 0, 0]   # y=5 (顶行)
  red:
    rows: 6
    cols: 3
    target_point_coord: [2, 0]   # 红方目标点
    data:
      - [0, 0, 0]   # y=0 (底行)
      - [1, 2, 1]   # y=1
      - [2, 3, 2]   # y=2
      - [3, 2, 1]   # y=3
      - [2, 1, 2]   # y=4
      - [0, 0, 0]   # y=5 (顶行)

# KFS 工作区域
kfs_region:
  y_range: [1, 5]          # KFS 可能出现的行 (左闭右开)

# ---------- A* 算法参数 ----------
a_star:
  obstacle_val: 4           # 障碍物标记值
  turn_penalty: 2           # 转向惩罚
  pickup_front_cost: 1.0    # 面向 R2 抓取代价
  pickup_side_cost: 2.0     # 侧向 R2 抓取代价
  extra_r2_penalty: 0.0     # 超出需求数的额外 R2 代价
  required_r2: 2            # 路径需收集的 R2 数量上限
  required_r1: 2            # 路径可跨越的 R1 数量上限 (cost=0)

# ---------- KFS 网格解析分数 ----------
kfs_scoring:
  r2_frac:  0.1             # R2 分数 (小数部分匹配)
  r1_frac:  0.2             # R1 分数
  fake_val: 4.0             # Fake/障碍物识别值

# ---------- ROS 节点默认值 ----------
ros_defaults:
  start:        [1, 5]      # 默认起点 (x, y)
  target:       [2, 0]      # 默认终点

# ---------- 测试预设场景 ----------
test_scenes:
  1:
    side: red
    start:  [1, 5]
    target: [0, 0]
    fake:   [0, 1]
    r1: [[0, 3], [2, 2], [2, 1]]
    r2: [[0, 4], [1, 4], [2, 4], [0, 2]]
  2:
    side: blue
    start:  [1, 5]
    target: [0, 0]
    fake:   [0, 3]
    r1: [[2, 1], [0, 2], [2, 4]]
    r2: [[1, 1], [1, 3], [2, 3], [1, 4]]
